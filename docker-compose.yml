services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: budget
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - budget_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget -d budget"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://budget:secret@db:5432/budget}
      BIND_ADDR: ${BIND_ADDR:-0.0.0.0:3001}
      RUST_LOG: ${RUST_LOG:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - budget_net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - budget_net

volumes:
  db_data:

networks:
  budget_net:
